mode: backtest # backtest, live
start_date: 2025-08-30
end_date: 2025-09-04
primary_interval: 1h
initial_cash: 100000
margin_requirement: 0.0
show_reasoning: false
show_agent_graph: true
signals:
  intervals: ["30m", "1h", "4h"]
  tickers: ["BTCUSDT", "ETHUSDT"]
  strategies: ['MacdStrategy']
# , "RSIStrategy"]
model:
  name: "gpt-4o-mini"
  provider: "openai"
#  base_url: "https://api.openai.com/v1"  #
execution:
  enabled: false          # Set true to place real orders
  exchange: "binance"     # binance | bybit
  testnet: true           # Always start with testnet
  max_order_value: 1000   # USD cap per single order
  min_confidence: 50      # Skip execution below this confidence
risk:
  stop_loss_pct: 2.0      # 2% below entry price
  take_profit_pct: 5.0    # 5% above entry price
  max_daily_loss_pct: 5.0 # Halt trading if daily loss > 5%
  max_open_positions: 5   # Max concurrent positions
  max_position_pct: 20.0  # Max % of portfolio per position
